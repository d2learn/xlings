name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0). Leave empty to use version from core/config.cppm'
        required: false
        type: string

env:
  GIT_TERMINAL_PROMPT: 0
  # CI runs on github.com; force GLOBAL mirror so xim doesn't try gitee
  # endpoints (which need auth and aren't reachable in CI).
  XLINGS_RELEASE_MIRROR: GLOBAL
  # Pinned bootstrap xlings used to read /.xlings.json and install all
  # build dependencies (xmake, cmake, ninja, musl-gcc on Linux, llvm on
  # macOS). Bump this in a dedicated PR after verifying the target
  # release is healthy.
  BOOTSTRAP_XLINGS_VERSION: v0.4.13
  # See xlings-ci-linux.yml for why this is pinned.
  XIM_PKGINDEX_REF: 19f4383ba5d65ab86cc6904f6392ceecb0be5d09

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl git build-essential

      - name: Install bootstrap xlings (pinned ${{ env.BOOTSTRAP_XLINGS_VERSION }})
        env:
          XLINGS_NON_INTERACTIVE: 1
          XLINGS_VERSION: ${{ env.BOOTSTRAP_XLINGS_VERSION }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings"           >> "$GITHUB_ENV"
          echo "$HOME/.xlings/subos/current/bin"     >> "$GITHUB_PATH"
          echo "$HOME/.xlings/bin"                   >> "$GITHUB_PATH"

      - name: Cache xlings package payloads
        uses: actions/cache@v4
        with:
          path: ~/.xlings/data/xpkgs
          key: xlings-deps-${{ runner.os }}-${{ hashFiles('.xlings.json') }}-${{ env.BOOTSTRAP_XLINGS_VERSION }}
          restore-keys: |
            xlings-deps-${{ runner.os }}-

      - name: Install build dependencies (xmake / cmake / ninja / musl-gcc)
        run: |
          cd "$GITHUB_WORKSPACE"
          xlings install -y
          gcc --version
          xmake --version

      - name: Prepare fixture index repo
        run: |
          bash tests/e2e/prepare_fixture_index.sh

      - name: Build (linux_release)
        # TODO(2026-): two workarounds, both removable once bootstrap
        # xlings 0.4.9 propagates everywhere:
        #   1. linux_release.sh's default MUSL_SDK assumes the legacy
        #      `data/xpkgs/musl-gcc/...` layout; modern xlings install
        #      uses `data/xpkgs/xim-x-musl-gcc/...`. Override here.
        #   2. CC / CXX must be ABSOLUTE PATHS to bypass xlings shim
        #      dispatch (same shim-vs-real-binary issue documented in
        #      xlings-ci-linux.yml). Without this, xrepo subprocess
        #      can't resolve the shim and reports "compiler does not
        #      support c++ module".
        run: |
          export MUSL_SDK="$HOME/.xlings/data/xpkgs/xim-x-musl-gcc/15.1.0"
          export CC="$MUSL_SDK/bin/x86_64-linux-musl-gcc"
          export CXX="$MUSL_SDK/bin/x86_64-linux-musl-g++"
          chmod +x ./tools/linux_release.sh
          SKIP_NETWORK_VERIFY=1 ./tools/linux_release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlings-linux-x86_64
          path: build/xlings-*-linux-x86_64.tar.gz

  build-macos:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bootstrap xlings (pinned ${{ env.BOOTSTRAP_XLINGS_VERSION }})
        env:
          XLINGS_NON_INTERACTIVE: 1
          XLINGS_VERSION: ${{ env.BOOTSTRAP_XLINGS_VERSION }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.sh | bash
          echo "XLINGS_HOME=$HOME/.xlings"           >> "$GITHUB_ENV"
          echo "$HOME/.xlings/subos/current/bin"     >> "$GITHUB_PATH"
          echo "$HOME/.xlings/bin"                   >> "$GITHUB_PATH"

      - name: Cache xlings package payloads
        uses: actions/cache@v4
        with:
          path: ~/.xlings/data/xpkgs
          key: xlings-deps-${{ runner.os }}-${{ hashFiles('.xlings.json') }}-${{ env.BOOTSTRAP_XLINGS_VERSION }}
          restore-keys: |
            xlings-deps-${{ runner.os }}-

      - name: Install build dependencies (xmake / cmake / ninja / llvm)
        run: |
          cd "$GITHUB_WORKSPACE"
          xlings install -y
          clang --version
          xmake --version

      - name: Build (macos_release)
        # TODO(2026-): same TODO as linux_release — macos_release.sh's
        # default LLVM_PREFIX assumes legacy `data/xpkgs/llvm/...`
        # without `xim-x-` prefix. Drop this export once the script
        # is updated.
        run: |
          export LLVM_PREFIX="$HOME/.xlings/data/xpkgs/xim-x-llvm/20.1.7"
          chmod +x ./tools/macos_release.sh
          SKIP_NETWORK_VERIFY=1 ./tools/macos_release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlings-macosx-arm64
          path: build/xlings-*-macosx-arm64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install bootstrap xlings (pinned ${{ env.BOOTSTRAP_XLINGS_VERSION }})
        shell: pwsh
        env:
          XLINGS_NON_INTERACTIVE: '1'
          XLINGS_VERSION: ${{ env.BOOTSTRAP_XLINGS_VERSION }}
        run: |
          irm https://raw.githubusercontent.com/openxlings/xlings/main/tools/other/quick_install.ps1 | iex
          "XLINGS_HOME=$env:USERPROFILE\.xlings"            >> $env:GITHUB_ENV
          "$env:USERPROFILE\.xlings\subos\current\bin"      >> $env:GITHUB_PATH
          "$env:USERPROFILE\.xlings\bin"                    >> $env:GITHUB_PATH

      - name: Cache xlings package payloads
        uses: actions/cache@v4
        with:
          path: ~\.xlings\data\xpkgs
          key: xlings-deps-${{ runner.os }}-${{ hashFiles('.xlings.json') }}-${{ env.BOOTSTRAP_XLINGS_VERSION }}
          restore-keys: |
            xlings-deps-${{ runner.os }}-

      - name: Install build dependencies (xmake / cmake / ninja)
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          xlings install -y

      - name: Build (windows_release)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tools\windows_release.ps1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xlings-windows-x86_64
          path: build/xlings-*-windows-x86_64.zip

  create-release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VER=$(sed -n 's/.*VERSION = "\([^"]*\)".*/\1/p' src/core/config.cppm | head -1)
            if [[ -z "$VER" ]]; then
              echo "Failed to read VERSION from src/core/config.cppm." >&2
              echo "Either fix the source path or pass an explicit version via workflow_dispatch input." >&2
              exit 1
            fi
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            artifacts/xlings-linux-x86_64/xlings-*-linux-x86_64.tar.gz
            artifacts/xlings-macosx-arm64/xlings-*-macosx-arm64.tar.gz
            artifacts/xlings-windows-x86_64/xlings-*-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
