name: xlings-ci-windows

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GIT_TERMINAL_PROMPT: 0
  # CI runs on github.com; force GLOBAL mirror so xim doesn't try gitee
  # endpoints (which need auth and aren't reachable in CI).
  XLINGS_RELEASE_MIRROR: GLOBAL
  # Pinned bootstrap xlings used to read /.xlings.json and install xmake
  # / cmake / ninja. Windows uses MSVC from the runner image (no compiler
  # in .xlings.json), so xmake's auto-detection still applies.
  BOOTSTRAP_XLINGS_VERSION: v0.4.8

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Phase 1: Configure Environment via xlings ─────────────────

      - name: Install bootstrap xlings (pinned ${{ env.BOOTSTRAP_XLINGS_VERSION }})
        shell: pwsh
        env:
          XLINGS_NON_INTERACTIVE: '1'
          XLINGS_VERSION: ${{ env.BOOTSTRAP_XLINGS_VERSION }}
        run: |
          irm https://raw.githubusercontent.com/d2learn/xlings/main/tools/other/quick_install.ps1 | iex
          "XLINGS_HOME=$env:USERPROFILE\.xlings"            >> $env:GITHUB_ENV
          "$env:USERPROFILE\.xlings\subos\current\bin"      >> $env:GITHUB_PATH
          "$env:USERPROFILE\.xlings\bin"                    >> $env:GITHUB_PATH

      - name: Cache xlings package payloads
        uses: actions/cache@v4
        with:
          path: ~\.xlings\data\xpkgs
          key: xlings-deps-${{ runner.os }}-${{ hashFiles('.xlings.json') }}-${{ env.BOOTSTRAP_XLINGS_VERSION }}
          restore-keys: |
            xlings-deps-${{ runner.os }}-

      - name: Install build dependencies (xmake / cmake / ninja)
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          xlings install -y

      - name: Prepare fixture index repo
        shell: bash
        run: |
          bash tests/e2e/prepare_fixture_index.sh

      - name: Configure xmake
        shell: pwsh
        run: xmake f -p windows -m release -y -vv

      # ── Phase 1.5: Unit Tests ────────────────────────────────────

      - name: Build and run unit tests
        shell: pwsh
        run: |
          xmake build -y -vv xlings_tests
          xmake run xlings_tests

      # ── Phase 2: Build via Release Script ───────────────────────

      - name: Build (windows_release)
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tools\windows_release.ps1"

      - name: "E2E-01: Bootstrap Home (portable + installed)"
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tests\e2e\bootstrap_home_test.ps1"

      - name: Prepare release artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem "build\xlings-*-windows-x86_64.zip" | Select-Object -First 1
          if (-not $zip) { throw "No release zip found" }
          Copy-Item $zip.FullName "build\release.zip"

      # ── Phase 3: E2E Tests ─────────────────────────────────────

      - name: "E2E-02: Release Self Install"
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tests\e2e\release_self_install_test.ps1" "build\release.zip"

      - name: "E2E-03: Quick Install Smoke"
        shell: pwsh
        continue-on-error: true
        run: |
          Remove-Item Env:XLINGS_HOME -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:USERPROFILE\.xlings" -ErrorAction SilentlyContinue
          Write-Host "=== Running quick install script ==="
          irm https://raw.githubusercontent.com/d2learn/xlings/refs/heads/main/tools/other/quick_install.ps1 | iex
          $env:Path = "$env:USERPROFILE\.xlings\subos\current\bin;$env:Path"
          $atSubos = Test-Path "$env:USERPROFILE\.xlings\subos\current\bin\xlings.exe"
          if (-not $atSubos) { throw "xlings not installed at .xlings\subos\current\bin" }
          Write-Host "=== Verify quick install ==="
          xlings -h
          xlings config
          xlings --version
          $searchOut = (xlings search d 2>&1) | Out-String
          Write-Host $searchOut
          if ($searchOut -match "(?i)invalid task:\s*xim") { throw "FAIL: quick install search hit invalid task: xim" }
          Write-Host "=== Cleanup quick install test ==="
          Remove-Item -Recurse -Force "$env:USERPROFILE\.xlings" -ErrorAction SilentlyContinue

      - name: "E2E-04: Release Subos + d2x"
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tests\e2e\release_subos_smoke_test.ps1" "build\release.zip"

      - name: "E2E-05: Project Shim Mirror"
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tests\e2e\project_shim_mirror_test.ps1"

      - name: "E2E-06: Shim Project Context"
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tests\e2e\shim_project_context_test.ps1"

      - name: "E2E-07: Sub-Index Search + pkgindex-build"
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\tests\e2e\sub_index_search_test.ps1" "build\release.zip"

      - name: Attach artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: xlings-windows-x86_64
          path: build/release.zip
